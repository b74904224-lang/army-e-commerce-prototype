# Nginx reverse proxy for the ARMYTAK storefront (Next.js) on OVHcloud.
# Place in /etc/nginx/sites-available/armytak-web.conf and symlink into
# sites-enabled, then obtain TLS certs with certbot.
#
#   sudo certbot --nginx -d armytak.com -d www.armytak.com

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name armytak.com www.armytak.com;
    return 301 https://$host$request_uri;
}

# Redirect www -> apex over HTTPS.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.armytak.com;

    ssl_certificate     /etc/letsencrypt/live/armytak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/armytak.com/privkey.pem;

    return 301 https://armytak.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name armytak.com;

    # Managed by certbot:
    ssl_certificate     /etc/letsencrypt/live/armytak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/armytak.com/privkey.pem;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-cache the immutable Next.js build assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
