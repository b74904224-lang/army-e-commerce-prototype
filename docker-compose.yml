# Full ARMYTAK stack: Next.js storefront + Express API.
# For OVHcloud: run `docker compose up -d --build` behind the Nginx configs in
# ./nginx (frontend) and ./server/nginx (API).

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.armytak.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://armytak.com}
    container_name: armytak-web
    restart: unless-stopped
    ports:
      # Bind to localhost; Nginx terminates TLS and proxies to this port.
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: armytak-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      # Persist order backups (data/orders.jsonl) across container restarts.
      - ./server/data:/app/data
