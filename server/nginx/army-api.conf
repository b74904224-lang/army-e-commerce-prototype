# Nginx reverse proxy for the ARMYTAK API on OVHcloud.
# Place in /etc/nginx/sites-available/army-api.conf and symlink into
# sites-enabled, then obtain TLS certs with certbot.
#
#   sudo certbot --nginx -d api.armytak.com

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name api.armytak.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.armytak.com;

    # Managed by certbot:
    ssl_certificate     /etc/letsencrypt/live/api.armytak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.armytak.com/privkey.pem;

    # Security headers (the app also sets helmet headers).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reasonable upload cap matching the API JSON body limit.
    client_max_body_size 512k;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
